<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Reportes Biomédicos · Intelmedica</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reportes Intelmedica">
<meta name="theme-color" content="#0B2540">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="equipos-data.js"></script>
<style>
:root{
  --navy:#0B2540;
  --navy-light:#123863;
  --teal:#3FA7B3;
  --teal-dark:#2C8791;
  --amber:#F2A93B;
  --bg:#F0F3F6;
  --card:#FFFFFF;
  --text:#16212C;
  --text-muted:#5B6B7A;
  --border:#DCE3E8;
  --danger:#D64550;
  --success:#2E9E5B;
  --radius:14px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:contain;
  padding-bottom:env(safe-area-inset-bottom);
}
button{font-family:inherit;}
#app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);}

/* Header */
.topbar{
  background:linear-gradient(135deg,var(--navy) 0%, var(--navy-light) 100%);
  color:#fff;
  padding:calc(env(safe-area-inset-top) + 14px) 18px 16px;
  position:sticky;top:0;z-index:20;
  box-shadow:0 2px 10px rgba(11,37,64,.25);
}
.topbar-row{display:flex;align-items:center;gap:10px;}
.topbar-back{
  background:rgba(255,255,255,.12);border:none;color:#fff;width:34px;height:34px;border-radius:10px;
  font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.topbar-title{font-size:17px;font-weight:700;letter-spacing:.2px;flex:1;}
.topbar-sub{font-size:12.5px;color:#B8CBE0;margin-top:2px;font-weight:500;}
.step-pills{display:flex;gap:6px;margin-top:12px;}
.step-pill{height:4px;flex:1;border-radius:3px;background:rgba(255,255,255,.18);}
.step-pill.active{background:var(--amber);}
.step-pill.done{background:var(--teal);}

/* Content */
.content{flex:1;padding:16px 16px 110px;}
.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:14px;
  border:1px solid var(--border);
}
.card-title{font-size:13px;font-weight:700;color:var(--teal-dark);text-transform:uppercase;letter-spacing:.6px;margin:0 0 12px;display:flex;align-items:center;gap:6px;}

.field{margin-bottom:14px;}
.field:last-child{margin-bottom:0;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:6px;}
.field-input-row{display:flex;gap:8px;align-items:stretch;}
input[type=text],input[type=date],textarea,select{
  width:100%;
  border:1.5px solid var(--border);
  border-radius:10px;
  padding:11px 12px;
  font-size:15.5px;
  background:#FAFBFC;
  color:var(--text);
  font-family:inherit;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--teal);background:#fff;}
textarea{resize:vertical;min-height:70px;line-height:1.4;}
.mic-btn{
  flex-shrink:0;width:44px;border:1.5px solid var(--border);background:#FAFBFC;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text-muted);
}
.mic-btn.listening{background:var(--danger);border-color:var(--danger);color:#fff;animation:pulse 1.1s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(214,69,80,.5);}70%{box-shadow:0 0 0 10px rgba(214,69,80,0);}100%{box-shadow:0 0 0 0 rgba(214,69,80,0);}}

.choice-row{display:flex;gap:8px;flex-wrap:wrap;}
.choice-btn{
  border:1.5px solid var(--border);background:#FAFBFC;border-radius:10px;padding:9px 14px;
  font-size:14px;font-weight:600;color:var(--text-muted);flex:1;text-align:center;min-width:90px;
}
.choice-btn.selected{background:var(--navy);border-color:var(--navy);color:#fff;}
.choice-btn.selected.amber{background:var(--amber);border-color:var(--amber);color:#3A2A00;}
.choice-btn.selected.danger{background:var(--danger);border-color:var(--danger);color:#fff;}

.checklist-item{
  display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);
}
.checklist-item:last-child{border-bottom:none;}
.checklist-check{
  width:24px;height:24px;border-radius:7px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:700;
}
.checklist-check.on{background:var(--success);border-color:var(--success);}
.checklist-text{font-size:14.5px;line-height:1.4;flex:1;}

.equipo-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;
}
.equipo-icon{
  width:42px;height:42px;border-radius:11px;background:var(--navy);color:var(--amber);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;font-weight:700;
}
.equipo-info{flex:1;min-width:0;}
.equipo-nombre{font-weight:700;font-size:15px;}
.equipo-meta{font-size:12.5px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.equipo-chevron{color:var(--text-muted);font-size:20px;}

.btn{
  border:none;border-radius:12px;padding:14px 18px;font-size:15.5px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
}
.btn-primary{background:var(--navy);color:#fff;}
.btn-teal{background:var(--teal);color:#fff;}
.btn-outline{background:#fff;color:var(--navy);border:1.5px solid var(--navy);}
.btn-ghost{background:transparent;color:var(--text-muted);}
.btn-danger-ghost{background:transparent;color:var(--danger);}
.btn-sm{padding:9px 14px;font-size:13.5px;width:auto;border-radius:9px;}

.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;
  max-width:520px;margin:0 auto;
  background:linear-gradient(180deg, rgba(240,243,246,0) 0%, var(--bg) 22%);
  padding:18px 16px calc(env(safe-area-inset-bottom) + 14px);
}
.bottom-bar-inner{display:flex;gap:10px;}

.empty-state{text-align:center;padding:50px 20px;color:var(--text-muted);}
.empty-state-icon{font-size:40px;margin-bottom:10px;}

.badge{display:inline-block;background:var(--teal);color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;margin-left:6px;}
.badge-amber{background:var(--amber);color:#3A2A00;}

.equipo-search{position:relative;}
.equipo-suggestions{
  position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--border);
  border-top:none;border-radius:0 0 10px 10px;max-height:220px;overflow-y:auto;z-index:10;
  box-shadow:0 8px 16px rgba(0,0,0,.08);
}
.equipo-suggestion{padding:11px 14px;font-size:14.5px;border-bottom:1px solid var(--border);}
.equipo-suggestion:last-child{border-bottom:none;}
.equipo-suggestion:active{background:var(--bg);}

.pdf-actions{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
.status-line{font-size:12.5px;color:var(--text-muted);text-align:center;margin-top:8px;}
.status-line.ok{color:var(--success);font-weight:600;}
.status-line.err{color:var(--danger);font-weight:600;}

.drive-status{display:flex;align-items:center;gap:8px;font-size:13px;padding:10px 12px;border-radius:10px;background:#FAFBFC;border:1.5px solid var(--border);margin-bottom:10px;}
.drive-dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted);}
.drive-dot.on{background:var(--success);}

.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:var(--navy);color:#fff;padding:11px 18px;border-radius:30px;font-size:13.5px;font-weight:600;
  z-index:100;box-shadow:0 6px 18px rgba(0,0,0,.2);max-width:88%;text-align:center;
}

/* Print styles: solo se usan cuando se genera el PDF vía impresión del navegador como respaldo */
@media print{
  body *{visibility:hidden;}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast-root"></div>
<script src="app.js"></script>
</body>
</html>
